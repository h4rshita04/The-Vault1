<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ayuuu 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400;1,600&family=DM+Sans:wght@300;400;500&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --rose: #E8637A; --blush: #F9D4DA; --deep: #2B1219; --cream: #FEF6F0;
    --warm: #F4A6B0; --text: #3D1A22; --muted: #9B6B74; --card-bg: rgba(255,255,255,0.75);
  }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; position: relative; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 20% 10%, #fce4ec 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 80%, #ffd6df 0%, transparent 55%),
                radial-gradient(ellipse 50% 50% at 50% 50%, #fff0f3 0%, transparent 70%);
    animation: bgPulse 8s ease-in-out infinite alternate; z-index: -2;
  }
  @keyframes bgPulse { 0% { opacity: 1; } 100% { opacity: 0.7; filter: hue-rotate(8deg); } }
  .petal { position: fixed; pointer-events: none; z-index: -1; animation: floatDown linear infinite; opacity: 0; user-select: none; }
  @keyframes floatDown {
    0%   { transform: translateY(-60px) rotate(0deg) scale(0.8); opacity: 0; }
    10%  { opacity: 0.55; }
    90%  { opacity: 0.35; }
    100% { transform: translateY(105vh) rotate(360deg) scale(1.1); opacity: 0; }
  }

  /* LOCK SCREEN */
  #lock-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.9s ease, transform 0.9s ease; padding: 20px; }
  #lock-screen.hide { opacity: 0; transform: scale(0.92) translateY(-30px); pointer-events: none; }
  .lock-card { background: rgba(255,255,255,0.88); backdrop-filter: blur(24px); border-radius: 32px; padding: 52px 44px 44px; text-align: center; border: 1.5px solid rgba(232,99,122,0.2); box-shadow: 0 8px 40px rgba(232,99,122,0.12), 0 2px 8px rgba(0,0,0,0.04); max-width: 380px; width: 100%; animation: cardFloat 6s ease-in-out infinite; }
  @keyframes cardFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .lock-icon { font-size: 3rem; margin-bottom: 16px; display: block; animation: heartbeat 1.8s ease-in-out infinite; }
  @keyframes heartbeat { 0%,100% { transform: scale(1); } 30% { transform: scale(1.18); } 60% { transform: scale(1.06); } }
  .lock-title { font-family: 'Dancing Script', cursive; font-size: 2rem; color: var(--rose); margin-bottom: 8px; line-height: 1.2; }
  .lock-sub { font-size: 0.84rem; color: var(--muted); margin-bottom: 32px; font-weight: 300; letter-spacing: 0.02em; }
  .input-wrap { position: relative; margin-bottom: 24px; }
  .input-wrap input { width: 100%; background: rgba(249,212,218,0.25); border: 1.5px solid rgba(232,99,122,0.3); border-radius: 50px; padding: 14px 24px; font-family: 'Dancing Script', cursive; font-size: 1.3rem; color: var(--text); text-align: center; outline: none; transition: all 0.3s; letter-spacing: 0.05em; }
  .input-wrap input::placeholder { color: var(--warm); }
  .input-wrap input:focus { border-color: var(--rose); background: rgba(249,212,218,0.4); box-shadow: 0 0 0 4px rgba(232,99,122,0.1); }
  .unlock-btn { width: 100%; background: linear-gradient(135deg, #e8637a 0%, #c94b63 100%); color: white; border: none; border-radius: 50px; padding: 15px 32px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 24px rgba(232,99,122,0.35); }
  .unlock-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(232,99,122,0.45); }
  .shake { animation: shake 0.45s ease !important; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }

  /* VAULT */
  #vault { display: none; opacity: 0; transition: opacity 0.8s ease; min-height: 100vh; padding: 0 0 80px; }
  #vault.show { display: block; }
  #vault.visible { opacity: 1; }
  .vault-header { text-align: center; padding: 70px 24px 50px; }
  .vault-header::after { content: ''; display: block; width: 60px; height: 2px; background: linear-gradient(90deg, transparent, var(--rose), transparent); margin: 28px auto 0; }
  .header-eyebrow { font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--rose); font-weight: 500; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s 0.2s ease forwards; }
  .header-title { font-family: 'Dancing Script', cursive; font-size: clamp(2.6rem, 7vw, 4.2rem); color: var(--text); line-height: 1.1; opacity: 0; animation: fadeUp 0.8s 0.4s ease forwards; }
  .header-title span { color: var(--rose); }
  .header-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--muted); margin-top: 12px; opacity: 0; animation: fadeUp 0.8s 0.6s ease forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }

  /* Cards */
  .cards-container { max-width: 560px; margin: 0 auto; padding: 0 20px; }
  .exhibit { background: var(--card-bg); backdrop-filter: blur(16px); border-radius: 24px; border: 1.5px solid rgba(232,99,122,0.15); padding: 36px 34px 30px; margin-bottom: 24px; box-shadow: 0 4px 24px rgba(232,99,122,0.08), 0 1px 4px rgba(0,0,0,0.04); opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease, transform 0.6s ease, box-shadow 0.3s ease; position: relative; overflow: hidden; }
  .exhibit::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--blush), var(--rose), var(--blush)); }
  .exhibit.visible { opacity: 1; transform: translateY(0); }
  .exhibit:hover { box-shadow: 0 12px 40px rgba(232,99,122,0.14), 0 2px 8px rgba(0,0,0,0.06); transform: translateY(-3px); }
  .exhibit-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .exhibit-label { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--rose); font-weight: 500; }
  .exhibit-num { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--blush), var(--warm)); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; color: var(--rose); flex-shrink: 0; }
  .quote-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.18rem; line-height: 1.85; color: var(--text); position: relative; padding-left: 18px; }
  .quote-text::before { content: '\201C'; position: absolute; left: -4px; top: -10px; font-size: 4rem; color: var(--blush); font-family: 'Cormorant Garamond', serif; line-height: 1; pointer-events: none; }
  .exhibit-date { margin-top: 20px; font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 6px; font-weight: 300; }
  .exhibit-date::before { content: '🌸'; font-size: 0.8rem; }

  /* Loading */
  .loading-state { text-align: center; padding: 60px 20px; color: var(--muted); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.2rem; }
  .loading-dots span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--rose); margin: 0 3px; animation: dotPulse 1.2s ease-in-out infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  /* Feedback */
  .feedback { max-width: 560px; margin: 20px auto 0; padding: 0 20px; opacity: 0; animation: fadeUp 0.8s 1s ease forwards; }
  .feedback-card { background: var(--card-bg); backdrop-filter: blur(16px); border-radius: 24px; border: 1.5px solid rgba(232,99,122,0.15); padding: 36px 34px; box-shadow: 0 4px 24px rgba(232,99,122,0.08); text-align: center; }
  .feedback-title { font-family: 'Dancing Script', cursive; font-size: 1.7rem; color: var(--rose); margin-bottom: 8px; }
  .feedback-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.95rem; color: var(--muted); margin-bottom: 22px; }
  .feedback textarea { width: 100%; background: rgba(249,212,218,0.2); border: 1.5px solid rgba(232,99,122,0.2); border-radius: 16px; padding: 16px 18px; font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: var(--text); resize: none; outline: none; transition: all 0.3s; line-height: 1.7; }
  .feedback textarea::placeholder { color: var(--warm); }
  .feedback textarea:focus { border-color: var(--rose); background: rgba(249,212,218,0.35); box-shadow: 0 0 0 4px rgba(232,99,122,0.08); }
  .send-btn { margin-top: 18px; background: linear-gradient(135deg, #e8637a, #c94b63); color: white; border: none; border-radius: 50px; padding: 13px 36px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 20px rgba(232,99,122,0.3); }
  .send-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(232,99,122,0.4); }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-card">
    <span class="lock-icon">🌸</span>
    <div class="lock-title">Hey, is that you?</div>
    <p class="lock-sub">type your nickname to open something special</p>
    <div class="input-wrap">
      <input type="text" id="key-input" placeholder="your nickname..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <button class="unlock-btn" onclick="unlock()">Open My Vault ✨</button>
  </div>
</div>

<div id="vault">
  <div class="vault-header">
    <div class="header-eyebrow">a little something for you</div>
    <div class="header-title">For <span>Ayuuu</span> 🌸</div>
    <div class="header-sub">Little moments I noticed, written down here</div>
  </div>
  <div class="cards-container" id="display-area">
    <div class="loading-state">
      gathering all the feelings
      <div class="loading-dots" style="margin-top:16px"><span></span><span></span><span></span></div>
    </div>
  </div>
  <div class="feedback">
    <div class="feedback-card">
      <div class="feedback-title">Wanna say something back? </div>
      <p class="feedback-sub">Well I am like this only...</p>
      <textarea id="resp" rows="4" placeholder="write here if you feel so..."></textarea>
      <br>
      <button class="send-btn" onclick="sendReply()">Send</button>
    </div>
  </div>
</div>

<script>
  const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR_Q0EfwJ2Y2FEFxG8cQvjWtG70XxyAeWqiJRux2Oj-ienajjdLoQ1DP6uUMpDRwHnvoB_PO69Re9xJ/pub?output=csv';

  const PETALS = ['🌸','🌷','💗','🌹','✨','💖','🫧','🌺','💝'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'petal';
    el.textContent = PETALS[Math.floor(Math.random() * PETALS.length)];
    el.style.cssText = `left:${Math.random()*100}vw;animation-duration:${7+Math.random()*10}s;animation-delay:${Math.random()*12}s;font-size:${0.8+Math.random()*0.8}rem;`;
    document.body.appendChild(el);
  }

  document.getElementById('key-input').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

  function unlock() {
    const val = document.getElementById('key-input').value.toLowerCase().trim();
    if (val === 'ayuuu') {
      const ls = document.getElementById('lock-screen');
      ls.classList.add('hide');
      setTimeout(() => {
        ls.style.display = 'none';
        const vault = document.getElementById('vault');
        vault.classList.add('show');
        setTimeout(() => { vault.classList.add('visible'); fetchData(); }, 60);
      }, 900);
    } else {
      const card = document.querySelector('.lock-card');
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');
      document.getElementById('key-input').value = '';
      document.getElementById('key-input').placeholder = 'try again, love 🥺';
    }
  }

  function parseCSVLine(line) {
    const result = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
      else if (ch===',' && !inQ) { result.push(cur.trim()); cur=''; }
      else cur+=ch;
    }
    result.push(cur.trim()); return result;
  }

  async function fetchData() {
    try {
      const res = await fetch(csvUrl);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const rows = text.split('\n').slice(1).filter(r => r.trim());
      const area = document.getElementById('display-area');
      area.innerHTML = '';
      if (!rows.length) {
        area.innerHTML = '<div class="loading-state">no memories yet — but they\'re coming 🌸</div>';
        return;
      }
      rows.forEach((row, i) => {
        const cols = parseCSVLine(row);
        if (cols.length < 3) return;
        const [date, title, text] = cols;
        const card = document.createElement('div');
        card.className = 'exhibit';
        card.innerHTML = `
          <div class="exhibit-meta">
            <span class="exhibit-label">Exhibit · ${title}</span>
            <span class="exhibit-num">${i+1}</span>
          </div>
          <p class="quote-text">${text}"</p>
          <div class="exhibit-date">${date}</div>`;
        area.appendChild(card);
      });
      observeCards();
    } catch(e) {
      console.error(e);
      document.getElementById('display-area').innerHTML = '<div class="loading-state">couldn\'t load right now — try refreshing 🌸</div>';
    }
  }

  function observeCards() {
    const cards = document.querySelectorAll('.exhibit');
    if (!('IntersectionObserver' in window)) { cards.forEach(c => c.classList.add('visible')); return; }
    const obs = new IntersectionObserver(entries => {
      entries.forEach((entry, idx) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), idx * 100);
          obs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });
    cards.forEach(c => obs.observe(c));
  }

  async function sendReply() {
    const val = document.getElementById('resp').value.trim();
    if (!val) { alert('write something first, even a single word 🥺'); return; }

    // IMPORTANT: Replace the text inside these quotes with your actual Web App URL
    const scriptUrl = "https://script.google.com/macros/s/AKfycbyiZV4jwdQIwZ97SHckx9WailV1ndaROiN5HWJbgdCrN--Fndpignu5gu8U1fa5wjba/exec"; 

    try {
        // We use 'no-cors' mode to ensure the message sends even if the browser 
        // complains about security policies
        await fetch(scriptUrl + "?message=" + encodeURIComponent(val), {
            method: 'POST',
            mode: 'no-cors'
        });
        
        // This makes the button look pretty after he clicks it
        const btn = document.querySelector('.send-btn');
        btn.textContent = 'Received .Thanks for your Response...';
        btn.style.background = 'linear-gradient(135deg, #c94b63, #a83352)';
        document.getElementById('resp').value = '';
        setTimeout(() => { 
            btn.textContent = 'Send'; 
            btn.style.background = ''; // Resets to original color
        }, 3000);
    } catch (e) {
        console.log("Sent!"); // Often it sends even if it catches an error
    }
}
</script>
</body>
</html>
